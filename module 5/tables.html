<!DOCTYPE html>
<html>
<head>
    <title>Tables and lists</title>
    <style>
        table, td, th{
            border:1px solid;
            border-collapse:collapse;
        }
    </style>
</head>
<body>
    <table>
        <thead>
        <tr> 
            <th>firstname</th> 
            <th>lastname</th>
            <th>age</th>
            <th>email</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Drin</td>
            <td>dalipi</td>
            <td>22</td>
            <td>drindalipi@gmail.com</td>
        </tr>
        <tr>
            <td>john</td>
            <td>doe</td>
            <td>45</td>
            <td>johndoe@@gmail.com</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">table footer</td>
            </tr>
        </tfoot>
    </table>
    <br>
    <table>
        <tr>
            <th>Name:</th>
            <td>john foe</td>
            <td>richard roe</td>

        </tr>
        <tr>
            <th rowspan="2">email:</th>
            <td>johndoe@gmail.com</td>
            <td rowspan="2">richarddoe@gmail.com</td>

        </tr>
        <tr>
            <td>johndoe@gamil.com</td>
        </tr>
    </table>
</body>
</html>
